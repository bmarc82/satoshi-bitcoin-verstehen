# ──────────────────────────────────────────────────────────────
#  Security Headers Snippet — wird von nginx.conf in jedem Block
#  eingebunden, der eigene `add_header`-Direktiven verwendet.
#
#  Hintergrund: nginx vererbt `add_header` NICHT von einem äusseren
#  Block, sobald der innere Block selbst `add_header` benutzt. Ohne
#  diesen Snippet würden /sw.js, /index.html, /manifest.json etc.
#  ohne CSP / X-Frame-Options / HSTS ausgeliefert.
#
#  Deployment: nach /etc/nginx/snippets/satoshi-security-headers.conf
#  kopieren (oder Pfad in nginx.conf entsprechend anpassen).
# ──────────────────────────────────────────────────────────────

add_header X-Content-Type-Options  "nosniff"                                              always;
add_header X-Frame-Options         "DENY"                                                 always;
add_header Referrer-Policy         "strict-origin-when-cross-origin"                      always;
add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()"             always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"       always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://platform.twitter.com https://cloud.umami.is; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://api.blockchain.info https://blockchain.info https://api.coingecko.com https://mempool.space https://api.alternative.me https://api.codetabs.com https://api.allorigins.win https://cloud.umami.is; frame-src https://platform.twitter.com https://www.youtube.com https://btcmap.org https://bitcoindeaths.com; manifest-src 'self'; worker-src 'self';" always;
