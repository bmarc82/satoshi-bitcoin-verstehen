# ──────────────────────────────────────────────────────────────
#  Satoshi PWA — Nginx Configuration
#  Äquivalent zu .htaccess (Apache)
#
#  Snippet-Abhängigkeit:
#    /etc/nginx/snippets/satoshi-security-headers.conf
#  → siehe nginx-security-headers.conf in diesem Repo.
# ──────────────────────────────────────────────────────────────

# Pfad zum Security-Headers-Snippet — anpassen falls anderswo abgelegt.
# Wir definieren ihn als Platzhalter-Variable für leichte Wartung.
# (nginx unterstützt `include` direkt, deshalb keine Variable nötig —
# der Pfad wird unten in jedem Block wiederholt.)

# ── HTTP → HTTPS Redirect ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name btc-klar.ch www.btc-klar.ch;
    return 301 https://btc-klar.ch$request_uri;
}

# ── www → non-www Redirect ───────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.btc-klar.ch;
    ssl_certificate     /etc/letsencrypt/live/btc-klar.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/btc-klar.ch/privkey.pem;
    return 301 https://btc-klar.ch$request_uri;
}

# ── Hauptkonfiguration (HTTPS) ─────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name btc-klar.ch;

    # ── SSL-Zertifikate (Let's Encrypt / Certbot) ──────────
    ssl_certificate     /etc/letsencrypt/live/btc-klar.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/btc-klar.ch/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Document Root ──────────────────────────────────────
    root /var/www/btc-klar.ch;
    index index.html;

    # ── Security Headers (Server-Level — gilt für location /) ─
    # Wegen nginx-add_header-Quirk MÜSSEN dieselben Header in jedem
    # inneren Block, der add_header benutzt, erneut included werden.
    include /etc/nginx/snippets/satoshi-security-headers.conf;

    # ── Compression: NUR pre-compressed Files ─────────────
    # WICHTIG: Runtime-gzip MUSS aus sein, sonst encodet nginx eine
    # bereits ausgelieferte .br-Datei NOCHMAL mit gzip — der Browser
    # bekommt dann «Content-Encoding: br» mit gzip-Body und stirbt
    # an ERR_CONTENT_DECODING_FAILED. (Hat Production am 2026-04-26
    # für ~30 min lahmgelegt — Lighthouse meldete Performance 40 weil
    # die Seite gar nicht lud.)
    #
    # Setup:
    #   - scripts/compress.js erzeugt für JEDE deployte Datei .br + .gz
    #   - gzip_static + brotli_static liefern diese Files direkt aus
    #   - Browser bekommt das beste Encoding das er akzeptiert
    #
    # Voraussetzungen:
    #   gzip_static  → built-in (ngx_http_gzip_static_module)
    #   brotli_static → braucht ngx_brotli (separates Modul, via
    #                   apt-get install libnginx-mod-http-brotli oder
    #                   selbst kompiliert). Wenn nicht verfügbar: die
    #                   brotli_static-Zeile auskommentieren — gzip_static
    #                   bringt ~75% des Wins. Browser verhandeln das
    #                   Encoding automatisch via Accept-Encoding.
    gzip off;
    gzip_static on;
    gzip_vary on;
    brotli_static on;
    # Wer dynamische (nicht-vorkomprimierte) Antworten zur Laufzeit
    # gzipen will, kann gzip wieder anschalten — DANN aber zwingend
    # `gzip_proxied off` setzen UND testen, dass .br Antworten nicht
    # gzip-rekomprimiert werden (curl Accept-Encoding: br|hexdump → die
    # ersten Bytes dürfen NICHT 1f8b08 sein, das wäre gzip-Magic).

    # ── MIME Types (falls nicht global gesetzt) ────────────
    types {
        image/svg+xml  svg svgz;
        application/json json;
        application/manifest+json webmanifest;
    }

    # ── Service Worker — niemals cachen ───────────────────
    location = /sw.js {
        include /etc/nginx/snippets/satoshi-security-headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires off;
    }

    # ── Rabbit Hole JS — immer revalidieren ────────────────
    location = /rabbit-hole.js {
        include /etc/nginx/snippets/satoshi-security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # ── HTML — immer revalidieren ─────────────────────────
    location = /index.html {
        include /etc/nginx/snippets/satoshi-security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # ── manifest.json ─────────────────────────────────────
    location = /manifest.json {
        include /etc/nginx/snippets/satoshi-security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        types { application/manifest+json json; }
    }

    # ── robots.txt & sitemap.xml ──────────────────────────
    location = /robots.txt {
        include /etc/nginx/snippets/satoshi-security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /sitemap.xml {
        include /etc/nginx/snippets/satoshi-security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Content-Type   "application/xml" always;
    }

    # ── Statische Assets — 1 Jahr cachen ──────────────────
    location ~* \.(png|svg|ico|css|js|woff2?|json)$ {
        include /etc/nginx/snippets/satoshi-security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # ── SPA Fallback (alle Routen → index.html) ──────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Versteckte Dateien blockieren ─────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ───────────────────────────────────────────
    access_log /var/log/nginx/btc-klar.ch.access.log;
    error_log  /var/log/nginx/btc-klar.ch.error.log;
}
