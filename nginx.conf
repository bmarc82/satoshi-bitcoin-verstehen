# ──────────────────────────────────────────────────────────────
#  Satoshi PWA — Nginx Configuration
#  Äquivalent zu .htaccess (Apache)
# ──────────────────────────────────────────────────────────────

# ── HTTP → HTTPS Redirect ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name btc-klar.ch www.btc-klar.ch;
    return 301 https://btc-klar.ch$request_uri;
}

# ── www → non-www Redirect ───────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.btc-klar.ch;
    ssl_certificate     /etc/letsencrypt/live/btc-klar.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/btc-klar.ch/privkey.pem;
    return 301 https://btc-klar.ch$request_uri;
}

# ── Hauptkonfiguration (HTTPS) ─────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name btc-klar.ch;

    # ── SSL-Zertifikate (Let's Encrypt / Certbot) ──────────
    ssl_certificate     /etc/letsencrypt/live/btc-klar.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/btc-klar.ch/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Document Root ──────────────────────────────────────
    root /var/www/btc-klar.ch;
    index index.html;

    # ── Security Headers ───────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://platform.twitter.com https://cloud.umami.is; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://api.blockchain.info https://blockchain.info https://api.coingecko.com https://mempool.space https://api.alternative.me https://api.codetabs.com https://api.allorigins.win https://cloud.umami.is; frame-src https://platform.twitter.com https://www.youtube.com https://btcmap.org https://bitcoindeaths.com; manifest-src 'self'; worker-src 'self';" always;

    # ── GZIP Compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # ── MIME Types (falls nicht global gesetzt) ────────────
    types {
        image/svg+xml  svg svgz;
        application/json json;
        application/manifest+json webmanifest;
    }

    # ── Service Worker — niemals cachen ───────────────────
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires off;
    }

    # ── Rabbit Hole JS — immer revalidieren ────────────────
    location = /rabbit-hole.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── HTML — immer revalidieren ─────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── manifest.json ─────────────────────────────────────
    location = /manifest.json {
        add_header Cache-Control "no-cache, must-revalidate" always;
        types { application/manifest+json json; }
    }

    # ── robots.txt & sitemap.xml ──────────────────────────
    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=86400" always;
        add_header Content-Type "application/xml" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Statische Assets — 1 Jahr cachen ──────────────────
    location ~* \.(png|svg|ico|css|js|woff2?|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback (alle Routen → index.html) ──────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Versteckte Dateien blockieren ─────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ───────────────────────────────────────────
    access_log /var/log/nginx/btc-klar.ch.access.log;
    error_log  /var/log/nginx/btc-klar.ch.error.log;
}
